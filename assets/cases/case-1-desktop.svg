<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">AI video pipeline</title>
  <desc id="desc">Чистая fullscreen-инфографика AI video pipeline на чёрном фоне.</desc>
  <defs>
    <style>
      .bg{fill:#000000;}
      .white{fill:#ffffff;}
      .gray{fill:#8a8a8a;}
      .accent-fill{fill:#cbfe4e;}
      .accent-stroke{stroke:#cbfe4e;}
      .thin{stroke-width:3;}
      .mid{stroke-width:4;}
      .thick{stroke-width:5;}
      .round{stroke-linecap:round;stroke-linejoin:round;}
      text{font-family:Inter, Arial, Helvetica, sans-serif;}
      .title{font-size:26px;font-weight:400;letter-spacing:-0.02em;}
      .intro-title{font-size:36px;font-weight:700;letter-spacing:-0.03em;}
      .intro-body{font-size:22px;font-weight:400;}
      .num{font-size:34px;font-weight:700;}
      .step-title{font-size:26px;font-weight:700;letter-spacing:-0.03em;}
      .label{font-size:17px;font-weight:700;}
      .body{font-size:17px;font-weight:400;}
      .result-title{font-size:40px;font-weight:700;letter-spacing:-0.03em;}
      .result-body{font-size:20px;font-weight:400;}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cbfe4e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1672" height="941"/>

  <text class="white title" x="50" y="60">AI video pipeline</text>
  <line class="accent-stroke thick round" x1="50" y1="83" x2="85" y2="83"/>

  <g transform="translate(50,128)">
    <line class="accent-stroke mid round" x1="0" y1="0" x2="0" y2="190"/>
    <text class="white intro-title" x="32" y="38">Задача</text>
    <text class="gray intro-body" x="32" y="86">
      <tspan x="32" dy="0">Задача: Повторяемый</tspan>
      <tspan x="32" dy="31">YouTube-формат: разные</tspan>
      <tspan x="32" dy="31">персонажи, одна структура,</tspan>
      <tspan x="32" dy="31">быстрый выпуск контента.</tspan>
    </text>
  </g>

  <g transform="translate(575,128)">
    <line class="accent-stroke mid round" x1="0" y1="0" x2="0" y2="190"/>
    <text class="white intro-title" x="32" y="38">Проблема</text>
    <text class="gray intro-body" x="32" y="86">
      <tspan x="32" dy="0">AI-видео превращается</tspan>
      <tspan x="32" dy="31">в визуальный шум.</tspan>
      <tspan x="32" dy="31">Прописывать и контролировать</tspan>
      <tspan x="32" dy="31">300+ промптов долго.</tspan>
    </text>
  </g>

  <g transform="translate(1060,128)">
    <line class="accent-stroke mid round" x1="0" y1="0" x2="0" y2="190"/>
    <text class="white intro-title" x="32" y="38">Ключевое решение</text>
    <text class="gray intro-body" x="32" y="86">
      <tspan x="32" dy="0">Человек пишет только идею.</tspan>
      <tspan x="32" dy="31">Я спроектировал цепочку</tspan>
      <tspan x="32" dy="31">системных промптов так, чтобы</tspan>
      <tspan x="32" dy="31">каждый шаг выдавал ровно то,</tspan>
      <tspan x="32" dy="31">что нужно следующему — не больше.</tspan>
    </text>
  </g>

  <g class="accent-stroke thin round" fill="none">
    <line x1="205" y1="425" x2="320" y2="425" marker-end="url(#arrow)"/>
    <line x1="500" y1="425" x2="595" y2="425" marker-end="url(#arrow)"/>
    <line x1="755" y1="425" x2="870" y2="425" marker-end="url(#arrow)"/>
    <line x1="1010" y1="425" x2="1135" y2="425" marker-end="url(#arrow)"/>
    <line x1="1285" y1="425" x2="1405" y2="425" marker-end="url(#arrow)"/>
  </g>

  <!-- Step 1: lamp made smaller and raised so it sits clearly above the label -->
  <g transform="translate(50,350)">
    <text class="accent-fill num" x="84" y="28">1</text>
    <g transform="translate(74,44) scale(0.64)" fill="none" class="accent-stroke thick round">
      <path d="M37 10c-20 0-35 15-35 34 0 13 7 22 15 30 5 5 6 10 6 17h28c0-7 1-12 6-17 8-8 15-17 15-30 0-19-15-34-35-34z"/>
      <line x1="25" y1="98" x2="49" y2="98"/>
      <line x1="28" y1="108" x2="46" y2="108"/>
      <line x1="37" y1="0" x2="37" y2="-12"/>
      <line x1="-10" y1="44" x2="2" y2="44"/>
      <line x1="72" y1="44" x2="84" y2="44"/>
      <line x1="4" y1="11" x2="-6" y2="1"/>
      <line x1="70" y1="11" x2="80" y2="1"/>
    </g>
    <text class="white step-title" x="49" y="173">Идея</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Единственная точка</tspan><tspan x="0" dy="22">входа.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Всё остальное</tspan><tspan x="0" dy="22">автономно.</tspan></text>
  </g>

  <g transform="translate(314,350)">
    <text class="accent-fill num" x="92" y="28">2</text>
    <g transform="translate(58,58)" fill="none" class="accent-stroke thick round">
      <path d="M0 0c20-8 43-6 62 7v58c-19-13-42-15-62-7z"/>
      <path d="M62 7c19-13 42-15 62-7v58c-20-8-43-6-62 7z"/>
      <line x1="62" y1="7" x2="62" y2="65"/>
      <line x1="16" y1="17" x2="47" y2="24"/>
      <line x1="16" y1="33" x2="47" y2="40"/>
      <line x1="78" y1="24" x2="110" y2="17"/>
      <line x1="78" y1="40" x2="110" y2="33"/>
    </g>
    <text class="white step-title" x="7" y="168">Библия проекта</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Фиксирует правила</tspan><tspan x="0" dy="22">мира.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Чтобы все шаги работали</tspan><tspan x="0" dy="22">в одном контексте.</tspan></text>
  </g>

  <g transform="translate(578,350)">
    <text class="accent-fill num" x="90" y="28">3</text>
    <path d="M57 83H87L96 49L117 123L134 83H160" fill="none" class="accent-stroke thick round"/>
    <text class="white step-title" x="37" y="168">Бит-шит</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Переводит эмоции</tspan><tspan x="0" dy="22">в действия.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Потому что камера</tspan><tspan x="0" dy="22">не снимает мысли.</tspan></text>
  </g>

  <g transform="translate(842,350)">
    <text class="accent-fill num" x="90" y="28">4</text>
    <g transform="translate(64,51)" fill="none" class="accent-stroke thick round">
      <rect x="0" y="0" width="72" height="70" rx="4"/>
      <rect x="14" y="14" width="22" height="22"/>
      <line x1="46" y1="16" x2="61" y2="16"/>
      <line x1="46" y1="31" x2="61" y2="31"/>
      <line x1="14" y1="50" x2="60" y2="50"/>
      <line x1="14" y1="60" x2="50" y2="60"/>
    </g>
    <text class="white step-title" x="35" y="168">Сценарий</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Определяет, как</tspan><tspan x="0" dy="22">показать происходящее.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Решает не что происходит,</tspan><tspan x="0" dy="22">а как это показать.</tspan></text>
  </g>

  <g transform="translate(1106,350)">
    <text class="accent-fill num" x="90" y="28">5</text>
    <g transform="translate(58,61)" fill="none" class="accent-stroke thick round">
      <line x1="0" y1="0" x2="72" y2="0"/>
      <circle cx="23" cy="0" r="8"/>
      <line x1="0" y1="24" x2="72" y2="24"/>
      <circle cx="48" cy="24" r="8"/>
      <line x1="0" y1="48" x2="72" y2="48"/>
      <circle cx="22" cy="48" r="8"/>
    </g>
    <text class="white step-title" x="4" y="168">Видеопромпты</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Создаёт точные</tspan><tspan x="0" dy="22">инструкции для модели.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Иначе модель</tspan><tspan x="0" dy="22">интерпретирует</tspan><tspan x="0" dy="22">по-своему.</tspan></text>
  </g>

  <g transform="translate(1370,350)">
    <text class="accent-fill num" x="92" y="28">6</text>
    <g transform="translate(65,51)" class="accent-stroke thick round">
      <circle cx="40" cy="40" r="39" fill="none"/>
      <path d="M31 20L31 60L62 40Z" class="accent-fill" stroke="none"/>
    </g>
    <text class="white step-title" x="37" y="168">Генерация</text>
    <text class="white label" x="0" y="209">Что делает:</text>
    <text class="gray body" x="0" y="241"><tspan x="0" dy="0">Veo 3 · Kling ·</tspan><tspan x="0" dy="22">Seedance.</tspan></text>
    <text class="white label" x="0" y="298">Зачем нужен:</text>
    <text class="gray body" x="0" y="330"><tspan x="0" dy="0">Финальный этап</tspan><tspan x="0" dy="22">создания видео.</tspan></text>
  </g>

  <!-- Result icon: feather-like dart tip -->
  <g transform="translate(50,780)">
    <g fill="none" class="accent-stroke thick round">
      <circle cx="55" cy="49" r="47"/>
      <circle cx="55" cy="49" r="28"/>
      <circle cx="55" cy="49" r="9"/>
      <line x1="55" y1="49" x2="98" y2="14"/>
    </g>
    <g class="accent-fill">
      <path d="M98 14 L130 6 L111 23 Z"/>
      <path d="M96 14 L112 -2 L109 18 Z"/>
      <path d="M100 15 L122 25 L108 23 Z"/>
      <path d="M105 21 L132 29 L113 26 Z"/>
    </g>
    <line class="accent-stroke thick round" x1="150" y1="0" x2="150" y2="98"/>
    <text class="white result-title" x="198" y="43">Результат</text>
    <text class="gray result-body" x="198" y="89">Конвейер от идеи до видеопромптов без ручного вмешательства на промежуточных шагах.</text>
  </g>
</svg>